<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light only">
  <title>Moments</title>
  <meta name="apple-itunes-app" content="app-id=6670760989" id="smartBanner">
  <meta property="og:title" content="Moments – Meet new people">
  <meta property="og:description" content="Discover activities, join groups, and meet new people with Moments.">
  <meta property="og:url" content="">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #FFFFFF;
      color: #30234B;
      min-height: 100vh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #30234B;
      border-radius: 20px;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo span {
      color: white;
      font-size: 36px;
      font-weight: 700;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #30234B;
    }
    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
      max-width: 320px;
    }
    .open-btn {
      display: inline-block;
      background: #30234B;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: 12px;
      text-decoration: none;
      margin-bottom: 16px;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .open-btn:active { opacity: 0.9; }
    .download-btn {
      display: inline-block;
      background: transparent;
      color: #30234B;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 12px;
      text-decoration: none;
      border: 1.5px solid #E0E0E0;
      margin-bottom: 12px;
    }
    .download-btn:active { opacity: 0.8; }
    .links {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 10px;
      -webkit-align-items: center;
      align-items: center;
    }
    .linktree {
      font-size: 13px;
      color: #999;
      margin-top: 24px;
    }
    .linktree a {
      color: #7B61FF;
      text-decoration: none;
    }
    .type-badge {
      display: inline-block;
      background: #F3F2F8;
      color: #30234B;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .preview-img {
      width: 100%;
      max-width: 280px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body style="color:#30234B;background-color:#FFFFFF;">

  <div id="logoContainer"><div class="logo" style="background-color:#30234B;"><span style="color:#FFFFFF;">M</span></div></div>
  <div class="type-badge" id="typeBadge" style="display:none;color:#30234B;background-color:#F3F2F8;"></div>
  <h1 id="heading" style="color:#30234B;">View this in Moments</h1>
  <p class="subtitle" id="subtitle" style="color:#666666;">Tap to open in the app. If you don't have it yet, download it from the App Store.</p>
  <div class="links">
    <a class="open-btn" id="openBtn" href="https://apps.apple.com/no/app/moments-aktiviteter/id6670760989?l=nb" style="color:#FFFFFF;background-color:#30234B;">Open in app</a>
    <a class="download-btn" id="downloadBtn" href="https://apps.apple.com/no/app/moments-aktiviteter/id6670760989?l=nb" style="color:#30234B;background-color:transparent;border-color:#E0E0E0;">Download from App Store</a>
    <a class="download-btn" id="googlePlayBtn" href="https://play.google.com/store/apps/details?id=no.momentsapp" style="color:#30234B;background-color:transparent;border-color:#E0E0E0;">Download from Google Play</a>
  </div>
  <div class="linktree" id="linktree" style="color:#999999;">Find us on <a href="https://linktr.ee/Moments_App" style="color:#7B61FF;">Linktree</a></div>

  <script>
    try {
    (function() {
      var APP_STORE = 'https://apps.apple.com/no/app/moments-aktiviteter/id6670760989?l=nb';
      var path = window.location.pathname;
      var fullUrl = window.location.href;
      var match = path.match(/^\/(event|group|profile)\/([a-zA-Z0-9-]+)/);
      var type = match ? match[1] : null;
      var id = match ? match[2] : null;
      var appUrl = (type && id) ? 'momentsapp://' + type + '/' + id : null;

      var heading = document.getElementById('heading');
      var subtitle = document.getElementById('subtitle');
      var openBtn = document.getElementById('openBtn');
      var badge = document.getElementById('typeBadge');
      var logoContainer = document.getElementById('logoContainer');

      // --- Type badge ---
      if (type && badge) {
        var typeLabels = { event: 'Activity', group: 'Group', profile: 'Profile' };
        badge.textContent = typeLabels[type] || '';
        badge.style.display = 'inline-block';
      }

      // --- Fallback heading if no type ---
      if (!type) {
        if (heading) { heading.textContent = 'Moments'; }
        if (subtitle) { subtitle.textContent = 'Discover activities, join groups, and meet new people.'; }
      }

      // --- OG tags ---
      var ogTitleTag = document.querySelector('meta[property="og:title"]');
      var ogDescTag = document.querySelector('meta[property="og:description"]');
      var ogUrlTag = document.querySelector('meta[property="og:url"]');
      if (ogTitleTag && type) { ogTitleTag.setAttribute('content', (type.charAt(0).toUpperCase() + type.slice(1)) + ' \u2013 Moments'); }
      if (ogUrlTag) { ogUrlTag.setAttribute('content', fullUrl); }

      // --- Smart App Banner with deep link ---
      var smartBanner = document.getElementById('smartBanner');
      if (smartBanner && appUrl) {
        smartBanner.setAttribute('content', 'app-id=6670760989, app-argument=' + appUrl);
      }

      // --- Open button click handler ---
      if (openBtn) {
        openBtn.onclick = function(e) {
          if (!appUrl) { return; }
          e.preventDefault();
          window.location.href = appUrl;

          var redirectTimer = setTimeout(function() {
            if (!document.hidden) {
              window.location.href = APP_STORE;
            }
          }, 2500);

          var onVisChange = function() {
            if (document.hidden) {
              clearTimeout(redirectTimer);
              document.removeEventListener('visibilitychange', onVisChange, false);
            }
          };
          document.addEventListener('visibilitychange', onVisChange, false);
        };
      }

      // --- Fetch event/group data from Supabase (non-blocking enhancement) ---
      try {
        if (type && id && (type === 'event' || type === 'group') && typeof fetch === 'function') {
          var SUPABASE_URL = 'https://ynuvtpkdxvzlmfqbuvvn.supabase.co';
          var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InludXZ0cGtkeHZ6bG1mcWJ1dnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTIyNDYwNzQsImV4cCI6MjAyNzgyMjA3NH0.mua9EwOROb26EnU7HOTl8thxIzBJ_ox52jzVVDCYfjg';
          var fetchHeaders = { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY };

          var fetchUrl = type === 'event'
            ? SUPABASE_URL + '/rest/v1/event?id=eq.' + id + '&select=title,description'
            : SUPABASE_URL + '/rest/v1/group?id=eq.' + id + '&select=title,description,header_image_path';

          fetch(fetchUrl, { headers: fetchHeaders })
            .then(function(r) {
              if (!r.ok) { throw new Error('HTTP ' + r.status); }
              return r.json();
            })
            .then(function(rows) {
              if (!rows || !rows.length) { return; }
              var item = rows[0];

              if (item.title && heading) {
                heading.textContent = item.title;
                document.title = item.title + ' \u2013 Moments';
              }

              if (item.description && subtitle) {
                var desc = item.description.length > 150
                  ? item.description.substring(0, 150) + '\u2026'
                  : item.description;
                subtitle.textContent = desc;
              }

              if (type === 'group' && item.header_image_path) {
                loadPreviewImage(SUPABASE_URL + '/storage/v1/object/public/event_images/' + item.header_image_path);
              } else if (type === 'event') {
                fetch(SUPABASE_URL + '/rest/v1/event_images?event_id=eq.' + id + '&select=image_path&order=sort_order.asc&limit=1', { headers: fetchHeaders })
                  .then(function(r) { return r.json(); })
                  .then(function(imgs) {
                    if (imgs && imgs.length && imgs[0] && imgs[0].image_path) {
                      loadPreviewImage(SUPABASE_URL + '/storage/v1/object/public/event_images/' + imgs[0].image_path);
                    }
                  })
                  .catch(function() {});
              }
            })
            .catch(function(err) {
              console.error('[Moments] Fetch error:', err);
            });
        }
      } catch (fetchErr) {
        console.error('[Moments] Fetch block error:', fetchErr);
      }

      function loadPreviewImage(src) {
        try {
          var img = document.createElement('img');
          img.className = 'preview-img';
          img.alt = '';
          img.onload = function() {
            if (logoContainer) {
              logoContainer.innerHTML = '';
              logoContainer.appendChild(img);
            }
          };
          img.onerror = function() {};
          img.src = src;
        } catch (e) {}
      }
    })();
    } catch (e) {
      if (typeof console !== 'undefined') { console.error('[Moments] Fatal JS error:', e); }
    }
  </script>
</body>
</html>
